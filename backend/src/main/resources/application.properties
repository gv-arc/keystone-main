spring.application.name=keystone

# Server (Render sets PORT)
server.port=${PORT:8080}

# PostgreSQL — override via environment variables (Docker / Render)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/keystone}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:keystone}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:keystone}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# JWT
keystone.jwt.secret=${JWT_SECRET:KeystoneMeridianFacilitiesManagementSecretKey2024MustBeLongEnough}
keystone.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# SLA thresholds (hours by priority)
keystone.sla.critical-hours=4
keystone.sla.high-hours=8
keystone.sla.medium-hours=24
keystone.sla.low-hours=48

# CORS
keystone.cors.allowed-origins=${KEYSTONE_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}

# OpenAPI
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# Logging
logging.level.com.keystone=INFO
logging.level.org.springframework.security=WARN
