version: '3.9'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: keystone-postgres
    environment:
      POSTGRES_DB: keystone
      POSTGRES_USER: keystone
      POSTGRES_PASSWORD: keystone
    ports:
      - "5432:5432"
    volumes:
      - keystone_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U keystone -d keystone" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - keystone-network

  # Spring Boot Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: keystone-backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/keystone
      SPRING_DATASOURCE_USERNAME: keystone
      SPRING_DATASOURCE_PASSWORD: keystone
      JWT_SECRET: KeystoneMeridianFacilitiesManagementSecretKey2024MustBeLongEnoughForDev
      JWT_EXPIRATION_MS: "86400000"
      KEYSTONE_CORS_ALLOWED_ORIGINS: http://localhost:5173,http://frontend:5173
      PORT: 8080
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080/actuator/health" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - keystone-network

  # React Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: keystone-frontend
    environment:
      VITE_API_URL: http://backend:8080
    ports:
      - "5173:5173"
    depends_on:
      - backend
    networks:
      - keystone-network

volumes:
  keystone_pg_data:
    driver: local

networks:
  keystone-network:
    driver: bridge
